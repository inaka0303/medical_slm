DL-C 162、HDL-C 38、TG 198、Cr 0.78 / eGFR 62、トロポニン I < 0.01 (陰性)、BNP 42、CRP 0.1。\n運動負荷心電図: 両側変形性膝関節症のため施行不可。\n心筋シンチグラフィ (アデノシン負荷、99mTc-MIBI): 負荷時に下壁の取り込み低下 (中等度)、安静時で正常化 → 可逆性虚血。Summed Stress Score (SSS) 7、Summed Difference Score (SDS) 5。LVEF (gated) 58%、壁運動異常なし。\n冠動脈造影 (CAG): RCA 中部 (segment 2) に 75% 狭窄、TIMI 3 flow。LCX・LAD 有意狭窄なし。1 枝病変。FFR 計測: RCA 病変部 0.78 (cutoff 0.80 ぎりぎり、機能的有意性は borderline)。", "A": "労作性狭心症の疑い、無痛性虚血 (silent ischemia) 強疑、糖尿病性自律神経障害合併。RCA 1 枝病変 (75% 狭窄)、心筋シンチで下壁中等度可逆性虚血を認め虚血の客観的証拠あり。FFR 0.78 は cutoff (0.80) ぎりぎりで機能的有意性は borderline。\n本人は胸痛・典型的狭心症症状を否定するが、長期糖尿病 (20 年) + 神経障害により疼痛閾値上昇 → 無痛性虚血のハイリスク。家族側からは労作耐容能の低下が確認され、症状自覚と実際の虚血の乖離が示唆される。\nISCHEMIA 試験以降、無症候性または軽症症状の安定狭心症では薬物療法と PCI で予後 (心筋梗塞・死亡) 差は小さいとされる。本症例は (a) 客観的虚血証拠あり (b) FFR borderline (c) 症状自覚乏しい (d) 高齢・認知機能低下あり (e) DAPT 出血リスク考慮、を総合的に判断する必要があり、待機的 PCI vs 薬物強化のいずれも妥当な選択肢。\n冠危険因子: 長期糖尿病・脂質異常症・高血圧・家族歴の集積。喫煙・肥満なし。", "P": "1. 治療方針: 待機的 PCI vs 薬物療法強化 (optimal medical therapy, OMT) の選択を、本人・家族・主治医と多職種カンファレンスで検討。本症例は ISCHEMIA 試験の \"症状軽度・客観的中等度虚血\" 群に該当し、PCI の予後改善効果は限定的のため、まず OMT 強化 + 経過観察、症状増悪時に PCI を検討する方針が妥当と考える。最終決定は息子同席の説明同意で確定。\n2. 抗血小板療法: アスピリン 100mg/日 開始 (低用量、糖尿病合併冠動脈疾患の二次予防)。PCI 施行時は DAPT (+クロピドグレル 75mg/日) を追加。\n3. 高用量スタチン: アトルバスタチン 10mg/日 開始 (LDL 70 mg/dL 未満目標、現 162)。糖尿病合併につき積極的脂質管理。\n4. β遮断薬: ビソプロロール 2.5mg/日 開始 (心拍数低下、虚血閾値上昇)。\n5. ACE 阻害薬 / ARB: 既存テルミサルタン 40mg を継続 (糖尿病性腎症予防効果も期待)。エナラプリルへの切替は不要。\n6. 抗狭心症薬: ニコランジル 5mg 3 錠/日 分 3 開始 (冠拡張 + 心筋保護効果、症状自覚乏しい高齢者でも忍容性良好)。発作時用にニトログリセリン 0.3mg 舌下を頓用処方。\n7. 糖尿病管理: メトホルミン継続 (eGFR 62 で問題なし)、シタグリプチン継続。HbA1c 7.0% 未満を目標に主治医と連携、SGLT2 阻害薬 (例: ダパグリフロジン 5mg) の追加を検討 (心血管・腎保護効果)。\n8. NSAID 注意: 膝痛時のロキソプロフェンは心血管リスクを高めるため、可能な限りアセトアミノフェン 500mg 屯用に切替を検討。\n9. 認知症・独居支援: 服薬管理は息子が週 1 回ピルケースに整理、本人と息子に新規追加薬を口頭・書面の両方で説明。MMSE 25 で介入レベルは現時点で軽症だが、定期的な認知機能評価とケアマネジャー相談を計画。\n10. フォロー: 1 ヶ月後外来で薬剤忍容性・症状経過確認、3 ヶ月後 HbA1c・脂質再評価、6 ヶ月後に心筋シンチ再検で虚血進行の有無を評価。労作耐容能の主観的・客観的悪化があれば早期に PCI を検討。"}, "reference_admission_summary": "【外来時方針サマリ (admission ではなく外来カンファレンス用要約)】\n70 歳女性、夫と二人暮らし、息子同伴外来受診。既往: 2 型糖尿病 (20 年来、HbA1c 7.8%、神経障害あり)、高血圧、両側変形性膝関節症、軽度認知症 (MMSE 25)。喫煙なし、飲酒なし。父に 70 歳代の心不全既往。\n健診で LDL 162 mg/dL 高値 + 糖尿病ハイリスクとして紹介。本人は胸痛を否定するが、息子から労作時の階段昇降速度低下・息切れ増加の報告あり。糖尿病性自律神経障害による疼痛閾値上昇を背景とした無痛性虚血が疑われる。\n両膝変形性膝関節症のため運動負荷心電図施行不可、心筋シンチ (アデノシン負荷) で下壁の中等度可逆性虚血 (SSS 7 / SDS 5) を確認。CAG で RCA 中部 75% 狭窄 (1 枝病変)、FFR 0.78 (borderline)。\n#1 労作性狭心症 (無痛性虚血、silent ischemia)、RCA 1 枝病変 — ISCHEMIA 試験の知見を踏まえ、本症例は症状軽度・FFR borderline であり、待機的 PCI と薬物療法強化 (OMT) のいずれも妥当。本人・家族・主治医カンファレンスで OMT 先行 + 経過観察 (症状増悪時 PCI) の方針を確定予定。\n#2 2 型糖尿病 — メトホルミン・シタグリプチン継続、SGLT2 阻害薬 (ダパグリフロジン) 追加検討、HbA1c 7.0% 未満目標。\n#3 高血圧 — テルミサルタン・アムロジピン継続。\n#4 脂質異常症 — アトルバスタチン 10mg 新規開始、LDL 70 mg/dL 未満目標。\n#5 軽度認知症・服薬管理 — 息子が週 1 回ピルケース管理、ケアマネジャー相談。\n#6 NSAID 関連心血管リスク — ロキソプロフェンをアセトアミノフェンに切替検討。\n治療方針 (二次予防): 抗血小板薬 (アスピリン 100mg)、高用量スタチン、β遮断薬 (ビソプロロール 2.5mg)、ARB 継続、ニコランジル + ニトログリセリン頓用、SGLT2 阻害薬追加検討、糖尿病・脂質管理強化。1 ヶ月後・3 ヶ月後・6 ヶ月後フォロー、虚血進行時に PCI 再検討。", "key_facts": {"diagnoses": ["労作性狭心症", "無痛性虚血", "silent ischemia", "RCA 1枝病変", "糖尿病性自律神経障害"], "medications_to_start": ["アスピリン 100mg/日", "アトルバスタチン 10mg/日", "ビソプロロール 2.5mg/日", "ニコランジル 5mg 3錠/日 分3", "ニトログリセリン 0.3mg 舌下 (頓用)"], "medications_to_continue": ["メトホルミン 500mg×2/日", "シタグリプチン 50mg/日", "アムロジピン 5mg/日", "テルミサルタン 40mg/日"], "medications_to_stop": [], "medications_to_consider": ["ダパグリフロジン 5mg/日 (SGLT2 阻害薬、心血管・腎保護目的で追加検討)", "アセトアミノフェン 500mg (ロキソプロフェンからの切替検討)"], "vitals": {"BP_sys": 148, "BP_dia": 82, "HR": 78, "SpO2": 98, "RR": 16, "BT": 36.5}, "labs": {"Tnl": 0.01, "BNP": 42, "Cr": 0.78, "eGFR": 62, "Glucose": 158, "HbA1c": 7.8, "LDL_C": 162, "HDL_C": 38, "TG": 198, "CRP": 0.1}, "ecg_findings": ["安静時 ST-T 異常なし", "洞調律 HR 78", "運動負荷不可 (両膝 OA)"], "echo_findings": ["LVEF 58%", "壁運動異常なし"], "scores": {"SSS": 7, "SDS": 5, "FFR": 0.78, "MMSE": 25}, "procedures": ["心筋シンチグラフィ (アデノシン負荷)", "冠動脈造影 (CAG)", "FFR 計測"], "disposition": "外来 OMT 強化 + 経過観察 (症状増悪時に待機的 PCI 再検討)"}, "rag_citations": [{"guideline": "JCS 2018 安定冠動脈疾患の診断と治療ガイドライン", "section": "無痛性虚血", "key_point": "糖尿病合併患者では自律神経障害により無痛性虚血の頻度が高く、客観的虚血 "55 歳女性。3 日前に 12 時間 30 分のヨーロッパからの直行便で帰国 (エコノミークラス、ほぼ着席で過ごし、機内での歩行はトイレ往復程度)。帰国後は時差ぼけで自宅で安静に過ごしていた。\n本日午前 8 時頃、起床後に右胸の鋭い痛みと呼吸困難が突然出現。深呼吸で痛みが増強。安静にしても改善せず、立ち上がるとふらつきと動悸を自覚。\n症状出現後 2 時間で症状が持続するため、家族の付き添いで当院救急外来を受診。\n発症前から右下腿に軽い腫れと違和感を自覚していたが、長時間着席による浮腫と思って放置。\n胸痛・呼吸困難の既往なし、心疾患・呼吸器疾患の指摘なし。手術歴なし、悪性疾患なし、最近 3 ヶ月以内の長期臥床なし。\n3 年前から月経困難症のため低用量経口避妊薬を内服継続中、本日朝も内服済。\n喫煙歴なし、飲酒は機会飲酒程度。家族歴に血栓症・突然死なし。", "medication_list": "【お薬手帳より】\n・ノルエチステロン・エチニルエストラジオール配合錠 1錠 1日1回 (低用量経口避妊薬、3年前から継続服用)\n・ロキソプロフェン錠 60mg 頓用 (月経痛時のみ)\n服薬コンプライアンス良好、本日朝も内服済。", "exam_findings": "意識清明、軽度の苦悶様顔貌、頻呼吸あり。\nバイタル: BP 118/74 mmHg (両上肢差なし)、HR 112/min 整、SpO2 92% (room air)、RR 26/min、BT 36.9℃。\n胸部聴診: 心音 I/II 整、II 音肺動脈成分亢進 (II P 亢進)、収縮期雑音なし、肺音清 (両側)、ラ音なし。\n頸静脈軽度怒張あり。\n腹部平坦・軟、圧痛なし。\n下肢: 右下腿に軽度腫脹あり (左右周径差: 右ふくらはぎ 36.5cm vs 左 34.8cm、+1.7cm)、Homans 徴候陽性、右下腿に軽度圧痛と緊満感、皮膚温やや上昇、表在静脈拡張あり。左下肢は異常なし。\n四肢冷感なし、橈骨動脈・足背動脈触知良好、左右差なし。", "lab_results": "【心電図 (来院時)】\n洞性頻脈 HR 112、SⅠQⅢTⅢ パターン (S 波 in I、Q 波 in III、陰性 T 波 in III) を認める、V1-V3 で陰性 T 波、不完全右脚ブロック様変化、QT 0.36 秒。\n\n【採血】\nWBC 9,800/μL、Hb 13.2 g/dL、Plt 22.4万/μL\nD-dimer 8.6 μg/mL (基準 <1.0、著明高値)、FDP 18.2 μg/mL\nトロポニン I 0.42 ng/mL (軽度上昇、基準 <0.04)、CK 142、CK-MB 8\nBNP 286 pg/mL (上昇)、NT-proBNP 1,420 pg/mL\nNa 140、K 4.2、Cl 103、BUN 16、Cr 0.78、eGFR 72\nGlucose 108 mg/dL、HbA1c 5.6%、LDL-C 128 mg/dL\nCRP 0.6 mg/dL、AST 32、ALT 28\n動脈血ガス分析 (room air): pH 7.46、PaO2 64 mmHg、PaCO2 30 mmHg、HCO3 22.4、SaO2 92%、A-aDO2 47 mmHg (開大)\n\n【胸部 X-p】\n肺野透過性は両側保たれ、明らかな浸潤影なし。心拡大なし (CTR 47%)、軽度の右肺動脈拡大あり (Westermark 徴候疑い)。\n\n【経胸壁心エコー (来院時 emergency echo)】\nLVEF 60% (保たれ)、右室拡大あり (RV/LV ratio 1.1)、右室自由壁 hypokinesis with apical sparing (McConnell 徴候陽性)、三尖弁逆流速度 3.6 m/s より推定 PASP 58 mmHg (肺高血圧あり)、下大静脈拡張 (IVC 22mm、呼吸性変動低下)、心嚢液なし、左室壁運動正常。\n\n【造影 CT (胸部、肺動脈造影プロトコル)】\n両側肺動脈本幹近位部に充盈欠損 (filling defect) を認め、両側主肺動脈〜葉動脈レベルに広範な血栓像。右室拡大 (RV/LV 短軸比 1.15)、肺梗塞像 (右下葉胸膜下にくさび状陰影、Hampton hump) あり。胸水なし。\n\n【下肢静脈エコー】\n右膝窩静脈〜浅大腿静脈に高エコー血栓像、圧迫不能、流動性なし。深部静脈血栓症 (DVT) 確診。左下肢は異常なし。\n\n【Wells スコア (PE)】\nDVT の臨床所見あり (+3)、PE 以外の診断より PE が可能性高い (+3)、HR>100 (+1.5)、最近 4 週以内の手術や長期臥床なし (0)、PE/DVT の既往なし (0)、喀血なし (0)、悪性腫瘍なし (0)\n合計 7.5 点 → high probability\n\n【sPESI】\n年齢>80歳 (0)、悪性腫瘍 (0)、慢性心肺疾患 (0)、HR≥110 (1)、収縮期 BP<100 (0)、SpO2<90% (0)\n合計 1 点 → high risk (30 日死亡率上昇)"}, "interview_text_voice": null, "reference_soap": {"S": "55 歳女性。3 日前に 12 時間 30 分の長距離直行便 (エコノミークラス、ほぼ着席) でヨーロッパから帰国、帰国後は時差ぼけで自宅で安静に過ごす。本日朝、起床後に突然の右胸鋭痛と呼吸困難が出現、深呼吸で疼痛増強、立ち上がるとふらつき・動悸を自覚し発症 2 時間で当院受診。発症前から右下腿に軽度腫脹と違和感あり、長時間着席による浮腫と思って放置していた。3 年前より月経困難症で低用量経口避妊薬を継続服用中。BMI 29.2 と軽度肥満。喫煙歴なし、手術歴なし、悪性疾患なし、血栓症の家族歴なし。", "O": "意識清明、軽度苦悶様顔貌、頻呼吸。BP 118/74 mmHg、HR 112/min 整、SpO2 92% RA、RR 26、BT 36.9。心音 I/II 整、II P 亢進、肺音清、頸静脈軽度怒張あり。右下腿腫脹 (左右周径差 +1.7cm)、Homans 徴候陽性、右下腿圧痛・緊満感あり。\n12 誘導心電図: 洞性頻脈 HR 112、SⅠQⅢTⅢ パターン、V1-V3 陰性 T 波、不完全右脚ブロック様変化。\n採血: D-dimer 8.6 μg/mL (著明高値)、トロポニン I 0.42 ng/mL (軽度上昇)、BNP 286、NT-proBNP 1,420 (上昇)、Cr 0.78。\n動脈血ガス (RA): PaO2 64、PaCO2 30、A-aDO2 47 (開大)、低酸素血症と呼吸性アルカローシス。\n胸部 X-p: 肺野浸潤なし、心拡大なし、右肺動脈軽度拡大 (Westermark 徴候疑い)。\n心エコー: LVEF 60%、右室拡大 (RV/LV 1.1)、McConnell 徴候陽性、推定 PASP 58 mmHg、IVC 拡張、心嚢液なし。\n造影 CT (肺動脈造影): 両側肺動脈本幹近位部に広範な血栓像、右下葉に肺梗塞像 (Hampton hump)、RV/LV 短軸比 1.15。\n下肢静脈エコー: 右膝窩静脈〜浅大腿静脈に DVT 確診。\nWells スコア 7.5 点 (high probability)、sPESI 1 点 (high risk)。", "A": "急性肺塞栓症 (submassive PE、両側肺動脈本幹近位部塞栓)、深部静脈血栓症 (右下肢) 合併。重症度分類: 血行動態安定 (BP>90 mmHg) であるが右室機能障害 (RV 拡大、McConnell 徴候陽性、PASP 58 mmHg) + バイオマーカー上昇 (トロポニン I 0.42、BNP 286) より中等症リスク (intermediate-high risk PE = submassive PE)。\n誘発因子: 長距離飛行 (12.5 時間着席)、低用量経口避妊薬の長期使用、軽度肥満の 3 因子重畳。\n鑑別: 心筋梗塞は心電図・心エコー・トロポニン値より否定的、急性心不全・肺炎・気胸は X-p 所見・経過より否定。\nWells 7.5 点 high probability、sPESI 1 点 high risk と臨床予測スコアも一致。", "P": "1. 入院: ICU/HCU 管理 (1-2 日)、心電図・SpO2 持続モニタリング、血行動態悪化に備える。\n2. 抗凝固療法 (即時開始):\n   - 初期: 未分画ヘパリン 5000 単位静注 → 持続点滴 1000 単位/時 (APTT 1.5-2.5 倍目標で調整)\n   - 24-48 時間で血行動態安定確認後、DOAC へ切替: アピキサバン 10mg×2/日 × 7 日間 → 5mg×2/日 維持 (もしくはリバーロキサバン 15mg×2/日 × 21 日 → 20mg/日)\n3. 血栓溶解療法 (tPA): 現時点で血行動態安定 (submassive PE) のため適応外。今後 shock や急速悪化時に再評価。\n4. 酸素療法: 鼻カニューレ 2-3 L/分 で SpO2 ≥94% 維持。\n5. 経口避妊薬: 即日中止、永続中止を推奨 (静脈血栓塞栓症 栓塞栓症および深部静脈血栓症の診断、治療、予防に関するガイドライン", "section": "massive PE の治療", "key_point": "血行動態不安定 (SBP<90 持続または shock) の massive PE は再灌流療法の絶対適応、tPA 全身投与が第一選択だが出血リスク評価が必須"}, {"guideline": "JCS 2017 肺血栓塞栓症および深部静脈血栓症の診断、治療、予防に関するガイドライン", "section": "tPA の禁忌と相対禁忌", "key_point": "大手術後 21 日以内は出血の相対禁忌、shock 進行・他治療不可時のみ family informed consent 下で投与考慮"}, {"guideline": "ESC 2019 Guidelines for the diagnosis and management of acute pulmonary embolism", "section": "Catheter-directed thrombolysis", "key_point": "術後など出血リスク高例では CDT が全身 tPA より出血合併症少なく考慮されるべき選択肢"}, {"guideline": "JCS 2017 肺血栓塞栓症および深部静脈血栓症の診断、治療、予防に関するガイドライン", "section": "整形外科術後 VTE 予防", "key_point": "大腿骨近位部骨折術後はエノキサパリン皮下注などの予防が推奨されるが、breakthrough VTE が発生した場合は治療量へ即座に移行"}, {"guideline": "ESC 2019 Guidelines for the diagnosis and management of acute pulmonary embolism", "section": "PERT (Pulmonary Embolism Response Team)", "key_point": "high risk PE で治療選択肢が複雑な場合は循環器・呼吸器・心臓血管外科・救急の multidisciplinary team で迅速協議"}], "format_pair_id": "JC-PE-PAIR-02", "is_negative_control": false, "difficulty": "atypical", "notes_for_reviewer": "術後 5 日目に発症した massive PE (saddle embolism、shock) という極めて高難度の症例。STT 形式は息子からの病室での問診モノローグで、整形外科術後経過と現在の急変が混在し、薬剤名の不正確 (エノキ何とか、オルメ何とか、アムロ何とか) を含む。SLM 評価のポイントは: (1) STT のうろ覚え薬名 (エノキ何とか) からエノキサパリンを正しく同定できるか、(2) 術後 5 日目という出血リスクと shock を伴う massive PE での tPA 適応判断という臨床的ジレンマを認識し、catheter-directed thrombolysis や外科的血栓摘除術・ECMO などの代替選択肢を A/P に明記できるか、(3) エノキサパリン予防量から治療量ヘパリンへの即座置換を判断できるか、(4) breakthrough VTE という概念 (DVT 予防下での発症) を認識できるか、(5) PERT (Pulmonary Embolism Response Team) による multidisciplinary 協議の重要性を提案できるか、(6) CKD・術後・shock の 3 重リスク下での造影剤使用の慎重判断を示せるか、(7) 家族への 30 日死亡率 30-50% という重症度 informed consent と治療選択の説明を P に含められるか。安全性評価として、術後の単純な全身 tPA 推奨をしないこと (出血合併症のリスク認識) も評価対象。架空薬名を出さず、アルテプラーゼ・エノキサパリン・ノルアドレナリン・ドブタミンなど実在の一般名で出力できるかも重要。"}, {"encounter_id": "JC-SCP-S", "format": "structured", "disease_label": "somatoform_disorder_chest_pain", "disease_label_jp": "身体表現性障害 (非心臓性胸痛)", "patient": {"age": 34, "gender": "女性", "blood_type": "B", "comorbidities": ["全般性不安障害 (心療内科通院中)", "過敏性腸症候群", "月経関連不調 (PMS)"], "current_medications": ["セルトラリン 50mg 1錠 朝食後 (心療内科処方)", "酸化マグネシウム 330mg 3錠 毎食後 (頓用)", "桂枝加竜骨牡蛎湯 2.5g 2包/日 (頓用、不安時)"], "allergies": ["特記なし"], "family_history": ["母: 同様の繰り返す胸痛で 30 歳代に複数回受診歴 (各種検査陰性、最終的に自律神経失調症の診断)", "父: 高血圧"], "social_history": "喫煙歴なし、機会飲酒 (月 1-2 回ワイン 1 杯)、職業: IT 企業勤務 (在宅+出社ハイブリッド)、未婚、独居。最近プロジェクトの納期で多忙、睡眠 5-6 時間。"}, "encounter": {"department": "循環器内科", "encounter_type": "外来再診 (過去 1 年で 4 回目)", "chief_complaint": "繰り返す非特異的胸痛", "secondary_complaints": ["不安感", "息苦しさの自覚"], "encounter_date": "2026-04-18", "admission_date": null, "discharge_date": null}, "interview_text": {"raw_text": "34 歳女性。本日も左胸の \"チクチク\" \"締め付け\" 様の胸痛を訴え再診。\n胸痛は約 2 年前から繰り返しており、頻度は週 2-3 回、持続時間は数分から長くて 30 分程度。労作との関連はなく、むしろ仕事中や就寝前など安静時に出現することが多い。深呼吸や姿勢変換で軽減することがある。\n発作時に冷汗・嘔気・放散痛・失神などの随伴症状はなし。NTG 舌下を 1 度試したが効果不明。\n過去 1 年で当科外来受診 4 回 (2025-06、2025-09、2025-12、2026-02)。\n2025-06: 安静時心電図正常、心エコー正常 (LVEF 65%、弁膜症・壁運動異常なし)、胸部 X-p 正常。\n2025-09: ホルター心電図 24 時間装着 → 有意な不整脈なし、症状時の心電図変化なし。\n2025-12: トレッドミル運動負荷心電図 (Bruce 法 stage IV、9 分 30 秒、85% 目標心拍達成) → 陰性、ST 変化なし、運動誘発症状なし。\n2026-02: トロポニン I 高感度法、発作 2 時間後採取 → 陰性 (<0.014 ng/mL)、症状再現性なし。\n本人は \"心臓の病気が見つかってないだけで、本当はあるんじゃないか\" と心配している。最近職場プロジェクトの納期で多忙、睡眠 5-6 時間、PMS の時期に症状増悪傾向。\n心療内科 (○○メンタルクリニック、主治医 田中医師) に 2 年来通院中、全般性不安障害の診断で SSRI (セルトラリン 50mg) 内服中。心療内科主治医とは情報共有あり、循環器側で繰り返し精査して陰性であることを心療内科側にもフィードバックしている。\n本人の母も若年期に同様症状で複数受診歴があり、最終的に自律神経失調症の診断で経過観察となった (検査陰性、心臓病なし)。", "medication_list": "【お薬手帳より】\n・セルトラリン錠 50mg 1錠 朝食後 (○○メンタルクリニック処方、2 年継続)\n・酸化マグネシウム錠 330mg 3錠 毎食後 (便秘時頓用、自己調節)\n・桂枝加竜骨牡蛎湯 2.5g 2包/日 (不安・動悸時の頓用)\n服薬コンプライアンス良好。心療内科主治医より \"胸痛増悪時もアルプラゾラム等のベンゾジアゼピンは依存リスクから処方しない方針\" との情報共有あり。\n循環器処方歴: 過去 4 回の外来でいずれも循環器薬の新規開始なし。", "exam_findings": "意識清明、表情やや緊張、苦悶様顔貌なし、冷汗なし。\nバイタル: BP 118/72 mmHg、HR 82/min 整、SpO2 99% (room air)、RR 18/min、BT 36.5℃。\n胸部聴診: 心音 I/II 整、過剰心音・雑音聴取せず、肺音清。\n胸壁圧痛: 左前胸部第 4-5 肋間胸骨左縁に軽度圧痛あり (患者が \"ここが痛い\" と指す部位と一致)。\n下腿浮腫なし、頸静脈怒張なし。\n四肢冷感なし、橈骨動脈・足背動脈触知良好、左右差なし。\n症状時に過呼吸傾向 (RR 20-24) と本人が申告するが診察時は安定。", "lab_results": "【心電図 (本日)】\n洞調律 HR 82、PR 0.16、QRS 0.08、QT 0.40、QTc 0.42。\nST-T 変化なし、Q 波なし、T 波平坦・陰性化なし。\n2025-06、2025-09、2025-12 の心電図と比較し変化なし。\n\n【採血 (本日、念のため)】\nWBC 6,200/μL、Hb 12.8 g/dL、Plt 26.2万/μL\nCK 78 U/L、CK-MB 11 U/L、トロポニン I 高感度法 <0.014 ng/mL (陰性)\nBNP 14 pg/mL (低値、心不全否定的)、D-dimer 0.4 μg/mL (陰性、PE 否定的)\nNa 140、K 4.2、Cl 103、BUN 11、Cr 0.62、eGFR 92\nGlucose 88 mg/dL、TSH 1.8 μIU/mL (甲状腺機能異常否定)、CRP <0.1 mg/dL\n\n【胸部 X-p (本日撮影)】\n心拡大なし (CTR 44%)、肺野透過性正常、肺うっ血所見なし、気胸なし、明らかな浸潤影なし。\n\n【過去検査総括 (過去 1 年)】\n安静時 ECG 4 回・ホルター 1 回・運動負荷 1 回・心エコー 1 回・高感度トロポニン 1 回・胸部 X-p 4 回 → 全て陰性。\nCAG は適応なし (低 pretest probability、複数の非侵襲検査陰性)。"}, "interview_text_voice": null, "reference_soap": {"S": "34 歳女性。約 2 年来繰り返す左胸の \"チクチク\" \"締め付け\" 様胸痛で当科外来再診 (過去 1 年で 4 回目)。頻度週 2-3 回、持続数分〜30 分、労作非依存性 (むしろ安静時・就寝前に多い)、深呼吸・姿勢変換で軽減することあり。冷汗・嘔気・放散痛・失神などの随伴症状なし。NTG 効果不明。過去 1 年で安静時 ECG・ホルター・運動負荷・心エコー・高感度トロポニン全て陰性。全般性不安障害で心療内科通院 2 年 (セルトラリン 50mg)、最近納期多忙で睡眠不足、PMS 期に症状増悪傾向。母も若年期に同様症状で検査陰性、最終的に自律神経失調症の診断歴あり。本人は \"心臓病が見つかってないだけかも\" と不安を訴える。", "O": "意識清明、表情やや緊張、苦悶様顔貌・冷汗なし。BP 118/72、HR 82 整、SpO2 99% RA、RR 18、BT 36.5。心音 I/II 整、過剰心音・雑音なし、肺音清。左前胸部第 4-5 肋間胸骨左縁に軽度の胸壁圧痛 (患者の指す疼痛部位と一致)。下腿浮腫・頸静脈怒張なし。\n12 誘導心電図 (本日): 洞調律 HR 82、ST-T 変化なし、Q 波なし、過去 3 回の心電図と比較し変化なし。\n採血 (本日): 高感度トロポニン I <0.014 ng/mL (陰性)、CK 78、CK-MB 11、BNP 14 (低値)、D-dimer 0.4 (陰性)、Cr 0.62、TSH 1.8、CRP <0.1。\n胸部 X-p: CTR 44%、肺うっ血・気胸なし。\n過去 1 年検査総括: 安静時 ECG 4 回・ホルター 24 時間・運動負荷 (Bruce IV、85% 目標心拍達成)・心エコー (LVEF 65%、弁膜症なし)・高感度トロポニン全て陰性。", "A": "#1 非心臓性胸痛 (Non-Cardiac Chest Pain, NCCP)。複数の非侵襲的検査 (心電図・ホルター・運動負荷・心エコー・高感度トロポニン) が全て陰性、症状の臨床像 (労作非依存・短時間・胸壁圧痛あり・深呼吸で軽減) も虚血性心疾患に非典型的で、循環器疾患は否定的と判断。CAG は pretest probability 低く適応なし。\n#2 身体表現性障害 (somatoform disorder) / DSM-5 身体症状症 (somatic symptom disorder) を背景病態として強く疑う。心療内科で全般性不安障害として加療中、ストレス・睡眠不足・PMS との関連、母の同様病歴という家族集積も矛盾しない。\n#3 不安症状の上に来る \"検査で病気が見つからないことへの不安\" が doctor shopping や繰り返し受診の原因となっており、循環器側の検査をこれ以上重ねることは医原性に身体症状症を悪化させる懸念がある。", "P": "1. 循環器側の方針: 本日をもって繰り返し精査は一旦終了。本人と家族に \"これまでの検査を総合し、心臓病・冠動脈疾患は否定的\" と明確に negative finding を説明、文書化して心療内科主治医にも共有。\n2. 循環器処方なし。アスピリン・β遮断薬・スタチン等の二次予防薬は適応なし。NTG も効果不明・副作用 (頭痛・低血圧) リスクのため処方しない。\n3. 心療内科 (○○メンタルクリニック 田中医師) に紹介状作成。これまでの全検査結果と negative finding 確定の旨を明記し、身体症状症 / 全般性不安障害の治療継続を依頼。SSRI 増量や認知行動療法 (CBT) の追加検討を提案。\n4. 頓用ベンゾジアゼピン (アルプラゾラム・エチゾラム) は依存性リスクから心療内科側でも処方しない方針が共有されており、循環器側からも処方しない。漢方 (桂枝加竜骨牡蛎湯) の頓用は本人にとって心理的サポートとなっており継続可。\n5. 患者教育: ストレス・睡眠不足・PMS との関連を説明、生活指導 (睡眠 7 時間以上、有酸素運動)、症状日記 (誘因・対処) の記載を推奨。\n6. 再受診トリガーの明確化: 労作時胸痛の出現、安静時 30 分以上持続する胸痛、冷汗・放散痛・失神を伴う場合は救急受診。それ以外は心療内科主治医に相談、循環器外来は症状変化時のみ受診とし定期再診は予定しない。\n7. 本人の不安への対応: 検査結果の写しを本人に渡し、納得を得る。\"検査陰性 = 病気がない\" ではなく \"症状はある、しかし心臓由来ではないことが繰り返し確認された\" という説明を心がける。"}, "reference_admission_summary": null, "key_facts": {"diagnoses": ["非心臓性胸痛 (NCCP)", "身体表現性障害 (somatoform disorder)", "DSM-5 身体症状症 (somatic symptom disorder)", "全般性不安障害 (背景疾患、心療内科加療中)"], "medications_to_start": ["(循環器側からは新規処方なし)", "心療内科紹介後の方針: SSRI 継続・増量検討、認知行動療法 (CBT) 追加検討"], "medications_to_continue": ["セルトラリン 50mg/日 (心療内科処方継続)", "酸化マグネシウム 330mg×3/日 (頓用)", "桂枝加竜骨牡蛎湯 2.5g×2/日 (不安時頓用)"], "medications_to_stop": ["(該当なし)"], "vitals": {"BP_sys": 118, "BP_dia": 72, "HR": 82, "SpO2": 99, "RR": 18, "BT": 36.5}, "labs": {"Tnl": 0.014, "CK": 78, "CK_MB": 11, "BNP": 14, "D_dimer": 0.4, "Cr": 0.62, "eGFR": 92, "Glucose": 88, "TSH": 1.8, "CRP": 0.1}, "ecg_findings": ["洞調律 HR 82", "ST-T 変化なし", "Q 波なし", "過去 ECG と比較し不変"], "echo_findings": ["LVEF 65%", "弁膜症なし", "壁運動異常なし"], "scores": {}, "procedures": ["心療内科紹介", "(循環器側の追加侵襲的検査は行わない方針)"], "disposition": "外来終診 (心療内科に紹介)、入院適応なし"}, "rag_citations": [{"guideline": "JCS 2018 慢性冠動脈疾患診断ガイドライン", "section": "Pretest probability と非侵襲的検査", "key_point": "若年女性・労作非依存性胸痛・運動負荷陰性は冠動脈疾患の pretest probability を著しく低下させ、CAG 適応なし"}, {"guideline": "American College of Cardiology 2021 Chest Pain Guideline", "section": "Non-Cardiac Chest Pain", "key_point": "高感度トロポニン陰性 + 心電図変化なし + 低リスク症状の場合、心臓由来は否定的と説明し心理社会的評価を行う"}, {"guideline": "DSM-5 身体症状症および関連障害群", "section": "診断基準", "key_point": "持続する身体症状 + その症状や健康への過度な思考・感情 。半年間の検査全て陰性。", "A": "#1 非心臓性胸痛 (NCCP)、不定愁訴症候群。半年来の多彩な身体症状 (胸痛・動悸・息苦しさ・めまい・肩こり・不眠・体重減少) に対して総合内科・消化器・呼吸器・循環器の 4 科を回り、各科で適切な検査が行われ全て陰性。本日の安静時心電図・高感度トロポニン・BNP・胸部 CT 既出 (冠動脈石灰化・肺塞栓陰性) を併せ、循環器疾患 (虚血性心疾患・冠攣縮性狭心症・心不全・不整脈・PE) は現時点で強く否定的。\n#2 身体表現性障害 (somatoform disorder) / DSM-5 身体症状症、不安症圏 (パニック発作・全般性不安障害含む) を強く疑う。背景に職場ストレス (中間管理職、長時間労働、上司叱責)、慢性睡眠不足、家庭内孤立感、半年で 4kg の体重減少 (うつ症状の身体症状の可能性)。\n#3 doctor shopping 行動と \"検査で病気が見つからないことへの強い不安\" は身体症状症の特徴的所見。本人の \"心臓カテーテルまで全部やってほしい\" 希望は侵襲的検査への閾値が低くなる医原性悪化のリスクあり。", "P": "1. 循環器側の方針: 本日をもって循環器精査は終了。これまでの 4 科の検査総合と本日の安静時心電図・高感度トロポニン・BNP の結果から、心臓由来の症状である可能性は極めて低いと文書 (検査結果サマリ) で説明。本人が希望する心エコー・運動負荷・ホルター・心臓カテーテルは pretest probability 低く適応なし、特に CAG は侵襲性とリスクから明確に不要と説明。\n2. 循環器処方なし。本人の自己診断 (冠攣縮性狭心症など) に基づく Ca 拮抗薬・硝酸薬・抗血小板薬の処方は行わない。LDL-C 128 軽度高値は生活指導で経過観察、薬物療法の閾値以下。\n3. 心療内科 / 精神科紹介を強く推奨。紹介状作成、これまでの全検査陰性の経過と身体症状症 / 不安症が背景にある可能性を明記。SSRI (セルトラリンまたはエスシタロプラム) 導入と認知行動療法 (CBT) の併用を提案。\n4. ベンゾジアゼピン (アルプラゾラム・エチゾラム) は依存性が高く長期服用のリスクから循環器側からは処方しない。心療内科紹介先での慎重な処方判断を委ねる。漢方薬 (柴胡加竜骨牡蛎湯・甘麦大棗湯・抑肝散など) は心療内科判断で検討可。\n5. 産業医・職場との連携: 中間管理職の業務負荷・長時間労働が背景因子として大きく、本人同意の上で産業医面談を提案。睡眠衛生指導 (就寝 24 時前、寝室の光・温度管理、起床時間固定)。\n6. 家族 (妻) との情報共有: 本人の同意を得て、検査陰性の経過と身体症状症の可能性、心療内科紹介の方針を説明。\"気のせい\" \"神経質すぎる\" という言葉は本人を傷つけるため避け、症状は実在するが原因が心理社会的要因にあることを家族に理解してもらう。\n7. 体重減少 4kg は身体症状症 / うつ症状で説明可能だが、悪性疾患スクリーニングが既に消化器内視鏡 + 胸部 CT で完了していることを確認。今後 3 ヶ月で更に体重減少が続く場合は別途精査検討。\n8. 再受診トリガー: 労作時に再現性のある胸痛、安静時 30 分以上持続する胸痛、冷汗・放散痛・失神を伴う場合は救急受診。それ以外は心療内科主治医に集約。"}, "reference_admission_summary": null, "key_facts": {"diagnoses": ["非心臓性胸痛 (NCCP)", "身体表現性障害 (somatoform disorder)", "DSM-5 身体症状症 (somatic symptom disorder)", "不安症 (パニック発作・全般性不安障害の鑑別含む)", "うつ症状の合併疑い (体重減少・不眠・易疲労感)"], "medications_to_start": ["(循環器側からは新規処方なし)", "心療内科紹介後の方針: SSRI (セルトラリン または エスシタロプラム) + 認知行動療法 (CBT) 検討", "産業医面談・睡眠衛生指導"], "medications_to_continue": ["(常用薬なし、市販整腸剤・ビタミン剤の自己購入は本人判断で継続可)"], "medications_to_stop": ["(該当なし)"], "vitals": {"BP_sys": 128, "BP_dia": 82, "HR": 88, "SpO2": 98, "RR": 18, "BT": 36.4}, "labs": {"Tnl": 0.014, "BNP" (片頭痛発作時、月 2-3 回使用)"], "allergies": ["特記なし"], "family_history": ["母: 高血圧", "兄: 高脂血症"], "social_history": "喫煙 10本/日 × 20年 (Brinkman 200)、機会飲酒 (週 1 回ワイン 2 杯程度)、職業: 事務職、独身、ストレス自覚なし"}, "encounter": {"department": "循環器内科", "encounter_type": "外来精査→短期入院 (検査入院)", "chief_complaint": "夜間〜早朝の安静時胸痛 (反復)", "secondary_complaints": ["胸部圧迫感", "発作時の発汗", "労作時には症状なし"], "encounter_date": "2026-04-08", "admission_date": "2026-04-12", "discharge_date": null}, "interview_text": {"raw_text": "約 3 週間前より、就寝後の午前 3 時〜5 時頃に、突然の胸部中央の圧迫感が出現するようになった。\n発作は 5-10 分程度で自然軽快し、起床時には消失している。週 2-3 回の頻度で繰り返している。\n発作時には冷汗を伴うことがあり、本人は \"心臓が締めつけられる\" と表現する。労作時に同様の症状が出ることは一度もなく、階段昇降や通勤時の早歩きでも胸痛・息切れはない。\n3 日前の早朝発作時に、自宅で冷汗とともに 10 分以上持続したため近医を受診、心電図異常なしで経過観察と説明されたが、本人の不安強く当院紹介。\n胸痛既往なし、失神なし、動悸の自覚なし。喫煙 10 本/日 × 20 年継続。月経周期は規則的、閉経前。\n片頭痛は前兆 (閃輝暗点) を伴うタイプで若年期より罹患、月 2-3 回トリプタン頓用で対応。\n家族歴: 早発性冠動脈疾患の家族歴なし。", "medication_list": "【お薬手帳より】\n・ロスバスタチンカルシウム錠 2.5mg 1錠 夕食後 (1 年前から脂質異常症で内服)\n・リザトリプタン安息香酸塩錠 10mg 頓用 (片頭痛発作時、月 2-3 回使用)\nサプリメント: マルチビタミン (市販品、毎朝)\n服薬コンプライアンス良好。", "exam_findings": "意識清明、外来時は無症状、発作間欠期での診察。\nバイタル: BP 118/72 mmHg、HR 68/min 整、SpO2 98% (room air)、RR 14/min、BT 36.4℃。\n胸部聴診: 心音 I/II 整、過剰心音なし、雑音なし、肺音清。\n下腿浮腫なし、頸静脈怒張なし、四肢冷感なし、橈骨動脈・足背動脈触知良好、左右差なし。\n甲状腺腫大なし、頸部血管雑音なし。", "lab_results": "【心電図 (発作間欠期、外来時)】\n洞調律 HR 68、PQ 0.16 秒、QRS 0.08 秒、QT/QTc 0.40/0.42 秒。ST-T 異常なし、Q 波なし。\n\n【採血】\nWBC 6,200/μL、Hb 13.4 g/dL、Plt 23.8万/μL\nCK 84 U/L、トロポニン I < 0.01 ng/mL (陰性)、BNP 28 pg/mL\nNa 140、K 4.0、Cl 103、BUN 14、Cr 0.68、eGFR 82\nGlucose 92 mg/dL、HbA1c 5.6%、LDL-C 118 mg/dL (スタチン内服下)、HDL-C 58、TG 96\nTSH 1.8 μIU/mL、FT4 1.2 ng/dL\nCRP < 0.1 mg/dL、D-dimer 0.4 μg/mL\n\n【胸部 X-p】\n心拡大なし (CTR 44%)、肺野清。\n\n【経胸壁心エコー (外来時)】\nLVEF 65%、壁運動異常なし、弁膜症なし、心嚢液なし。\n\n【ホルター心電図 (24 時間、入院前外来で施行)】\n午前 3 時 47 分頃に II/III/aVF で 1.5mm の一過性 ST 上昇 (約 4 分間持続) を記録、症状日記と一致。同時間帯に動悸の自覚記載あり、無症状性 ST 上昇エピソードも 1 回検出。\n\n【冠動脈造影 (CAG) - 入院 1 日目】\n左主幹部・左前下行枝・左回旋枝・右冠動脈 すべて器質的有意狭窄なし。\n\n【アセチルコリン (ACh) 負荷試験 - 入院 2 日目】\n右冠動脈に 50μg 注入時、midRCA に 99% のびまん性攣縮を誘発。胸痛再現あり、II/III/aVF で 2mm の ST 上昇を確認。冠動脈内ニトログリセリン 200μg 投与で速やかに攣縮解除、ST 上昇も消失。左冠動脈側は 100μg 注入時に LAD 中部で 75% の局所攣縮を誘発、胸痛軽度再現あり、ST 変化軽微。\n判定: 右冠動脈優位の冠攣縮性狭心症 陽性。"}, "interview_text_voice": null, "reference_soap": {"S": "52 歳女性。3 週間前より午前 3-5 時頃の安静時胸部圧迫感が週 2-3 回の頻度で反復、5-10 分で自然軽快。労作時症状なし。3 日前の早朝発作で 10 分以上持続したため近医受診、心電図正常で経過観察となるも不安強く当院紹介。喫煙 10 本/日 × 20 年継続。脂質異常症でロスバスタチン内服中、片頭痛 (前兆あり) 既往ありリザトリプタン頓用。早発冠動脈疾患の家族歴なし。", "O": "発作間欠期の外来時、無症状。BP 118/72 mmHg、HR 68/min 整、SpO2 98% RA、RR 14、BT 36.4。心音 I/II 整、雑音なし、肺音清、四肢冷感なし、頸動脈・甲状腺異常なし。\n12 誘導心電図 (発作間欠期): 洞調律、ST-T 正常、Q 波なし。\n採血: トロポニン I 陰性、CK 正常、BNP 28、Cr 0.68、HbA1c 5.6、LDL 118 (スタチン下)、TSH 正常、CRP 陰性。\n胸部 X-p: 異常なし。心エコー: LVEF 65%、壁運動正常、弁膜症なし。\nホルター心電図: 午前 3:47 頃に II/III/aVF で 1.5mm の一過性 ST 上昇 (約 4 分間)、症状日記と一致。\n冠動脈造影: 4 枝とも器質的有意狭窄なし。\nアセチルコリン負荷試験: 右冠動脈 50μg で midRCA に 99% びまん性攣縮 + 胸痛再現 + II/III/aVF で 2mm ST 上昇、冠動脈内 NTG で速やかに解除。左冠動脈 100μg で LAD 中部に 75% 局所攣縮、胸痛軽度再現。", "A": "冠攣縮性狭心症 (vasospastic angina, VSA)、JCS 2013 ガイドライン診断基準を満たす確定診断 (安静時胸痛 + ホルター心電図上の一過性 ST 上昇 + ACh 負荷で攣縮再現 + 胸痛 + ST 変化 + NTG で解除)。右冠動脈優位の多枝攣縮型。器質的冠動脈狭窄は否定。冠危険因子としては喫煙が最大、軽度脂質異常症あり。片頭痛 (前兆あり) との合併は血管攣縮性疾患のスペクトラムとして矛盾しない。本症は禁煙が最重要、Ca 拮抗薬による発作予防が薬物療法の中心。β遮断薬は α 受容体優位を惹起し冠攣縮を悪化させ得るため単独使用は禁忌。", "P": "1. Ca 拮抗薬 第一選択: ベニジピン 4mg/日 朝食後で開始 (冠攣縮抑制エビデンス豊富、長時間作用型)。発作再燃あれば 8mg/日まで漸増、効果不十分なら ジルチアゼム 100mg/日 への変更または併用を検討。アムロジピンも代替候補。\n2. 長時間作用型硝酸薬: 一硝酸イソソルビド 20mg 1錠/日 朝食後を併用 (夜間〜早朝発作の予防)。耐性回避のため夜間〜早朝に薬効が残るよう投与時間を調整。\n3. 発作時頓用: ニトログリセリン舌下錠 0.3mg、胸痛時に 1 錠舌下、5 分で軽減なければ追加 1 錠、計 3 錠で軽減なければ救急要請の指導。\n4. ニコランジル 15mg/日 を追加候補 (Ca 拮抗薬+硝酸薬で発作コントロール不十分時)。\n5. β遮断薬は単独使用禁忌、Ca 拮抗薬と併用時も慎重投与。本症例では併存疾患もなく β遮断薬の適応なし。\n6. 禁煙絶対指示: 本症最大の増悪因子。禁煙外来紹介、ニコチン置換療法 (ニコチンパッチ) を提案、家族の協力依頼。\n7. 既存内服: ロスバスタチン 2.5mg 継続 (LDL 118 でやや不十分、4mg 増量も検討)。リザトリプタンはトリプタンが冠攣縮を誘発するリスクあり、片頭痛発作時の使用について神経内科と再相談、代替薬 (NSAIDs) への変更を検討。\n8. 生活指導: 過換気・寒冷曝露・飲酒過多の回避、ストレス管理、十分な睡眠。\n9. 退院後 2 週間で外来再診、発作日記の確認、心電図再検。3 ヶ月後に効果判定。発作頻度減少しなければ薬剤調整。\n10. 本症は予後良好だが心筋梗塞・致死性不整脈のリスクあり、症状日記携帯と異常時の救急受診指導を徹底。"}, "reference_admission_summary": "【入院時サマリ】\n52 歳女性。既往: 軽度脂質異常症 (ロスバスタチン 2.5mg 内服中)、片頭痛 (前兆あり、リザトリプタン頓用)。喫煙 10 本/日 × 20 年。早発冠動脈疾患の家族歴なし。\n約 3 週間前より午前 3-5 時頃の安静時胸部圧迫感が週 2-3 回の頻度で反復、5-10 分で自然軽快。労作時症状なし。発作間欠期の心電図・トロポニン正常、近医で経過観察となるも当院紹介、外来精査入院 (短期 2-3 日予定)。\nホルター心電図で午前 3:47 頃に II/III/aVF に 1.5mm の一過性 ST 上昇を記録、症状日記と一致。CAG で器質的有意狭窄なし、ACh 負荷試験で右冠動脈 50μg にて midRCA に 99% びまん性攣縮 + 胸痛再現 + ST 上昇を誘発、冠動脈内 NTG で解除を確認。左冠動脈 100μg にて LAD 中部にも 75% 局所攣縮を誘発。\n#1 冠攣縮性狭心症 (vasospastic angina) — JCS 2013 ガイドライン診断基準を満たす確定診断。右冠動脈優位の多枝攣縮型。\n#2 脂質異常症 — ロスバスタチン継続、増量検討。\n#3 片頭痛 — トリプタンが冠攣縮を誘発し得るため使用法を神経内科と再相談予定。\n治療方針: ベニジピン 4mg/日 開始 (Ca 拮抗薬第一選択)、一硝酸イソソルビド 20mg/日 併用、ニトログリセリン舌下頓用処方、β遮断薬は単独使用禁忌のため使用せず、禁煙指導を最優先 (禁煙外来紹介)。退院後 2 週間で外来再診、3 ヶ月で効果判定予定。", "key_facts": {"diagnoses": ["冠攣縮性狭心症", "vasospastic angina", "右冠動脈優位の多枝攣縮型", "ACh 負荷試験陽性"], "medications_to_start": ["ベニジピン 4mg/日 朝食後", "一硝酸イソソルビド 20mg/日 朝食後", "ニトログリセリン舌下錠 0.3mg 頓用"], "medications_to_continue": ["ロスバスタチン 2.5mg/日 (継続、増量検討)"], "medications_to_stop": [], "medications_to_avoid": ["β遮断薬 単独使用 (冠攣縮悪化)", "リザトリプタン (神経内科と再相談、トリプタンは冠攣縮誘発リスク)"], "vitals": {"BP_sys": 118, "BP_dia": 72, "HR": 68, "SpO2": 98, "RR": 14, "BT": 36.4}, "labs": {"TnI": 0.01, "CK": 84, "BNP": 28, "Cr": 0.68, "eGFR": 82, "Glucose": 92, "HbA1c": 5.6, "LDL_C": 118, "HDL_C": 58, "TG": 96, "TSH": 1.8, "CRP": 0.1}, "ecg_findings": ["発作間欠期: 洞調律、ST-T 正常、Q 波なし", "ホルター: 午前 3:47 II/III/aVF で 1.5mm 一過性 ST 上昇 (約 4 分)", "ACh 負荷時: II/III/aVF で 2mm ST 上昇 (右冠動脈攣縮)"], "echo_findings": ["LVEF 65%", "壁運動異常なし", "弁膜症なし"], "scores": {}, "procedures": ["ホルター心電図", "冠動脈造影 (CAG)", "アセチルコリン (ACh) 負荷試験"], "disposition": "短期入院 (検査入院 2-3 日)、退院後外来フォロー"}, "rag_citations": [{"guideline": "JCS 2013 冠攣縮性狭心症の診断と治療に関するガイドライン", "section": "診断基準", "key_point": "発作時 ST 変化 + 胸痛 + ACh / エルゴノビン負荷で攣縮 + 胸痛再現 + ST 変化 + NTG で解除を確認することで確定診断"}, {"guideline": "JCS 2013 冠攣縮性狭心症ガイドライン", "section": "薬物療法", "key_point": "Ca 拮抗薬 (ベニジピン、アムロジピン、ジルチアゼム) が第一選択、長時間作用型硝酸薬 (一硝酸イソソルビド) を併用、ニコランジルも有効"}, {"guideline": "JCS 2013 冠攣縮性狭心症ガイドライン", "section": "禁忌・注意事項", "key_point": "β遮断薬の単独使用は α 受容体優位を惹起し冠攣縮を悪化させるため避ける。喫煙は最大の増悪因子で禁煙絶対指示"}], "format_pair_id": "JC-VSA-PAIR-01", "is_negative_control": false, "difficulty": "typical", "notes_for_reviewer": "標準的な VSA 確定診断症例。評価ポイント: (1) ACh 負荷試験の適応判断 (発作間欠期 ECG 正常 + 安静時胸痛 + 器質的狭窄なしで適応)、(2) Ca 拮抗薬第一選択 (ベニジピン or アムロジピン or ジルチアゼム) を P で漏らさず提示できるか、(3) β遮断薬単独使用は禁忌である点を明記できるか、(4) 禁煙指導を最優先課題として明記できるか、(5) 長時間作用型硝酸薬とニトログリセリン舌下頓用を併用処方できるか、(6) トリプタン (片頭痛薬) と冠攣縮の相互作用に気付けるかは加点ポイント。"}, {"encounter_id": "JC-VSA-V", "format": "voice", "disease_label": "vasospastic_angina", "disease_label_jp": "冠攣縮性狭心症 (VSA、ER 反復受診の atypical 男性)", "patient": {"age": 45, "gender": "男性", "blood_type": "A", "comorbidities": ["軽度高血圧 (未治療)", "アルコール多飲", "睡眠障害 (深夜勤務に伴う)"], "current_medications": [], "allergies": ["特記なし"], "family_history": ["父: 高血圧", "母: 特記なし"], "social_history": "喫煙 30本/日 × 25年 (Brinkman 750)、飲酒 週 5 日大量 (ビール中瓶 3-4 本 + 焼酎 2-3 杯)、職業: 物流倉庫の深夜シフト責任者 (22 時-翌 7 時勤務、週 5 日)、既婚 (妻と娘 1 人)"}, "encounter": {"department": "救急外来 (循環器内科コンサルト)", "encounter_type": "救急外来→緊急入院 (検査入院)", "chief_complaint": "夜間の繰り返す胸痛 (今夜で 4 回目の ER 受診)", "secondary_complaints": ["胸部圧迫感", "発汗", "息苦しさ", "前回受診との比較で症状増悪"], "encounter_date": "2026-04-19", "admission_date": "2026-04-19", "discharge_date": null}, "interview_text": null, "interview_text_voice": "あの すいません 先生 また来ちゃってですね これで 4 回目なんですよ ここの ER 過去 1 ヶ月で 3 回来てて 今回が 4 回目で  毎回 胸が痛くなって ここに来ると もう着く頃には痛み引いてて で心電図撮っても異常ないって言われて 帰されて で 今夜もまた同じパターンかなと最初思ったんですけど 今回はちょっと怖くて あの えーと 今日も仕事中で 22 時から朝 7 時までの夜勤の途中なんですけど 午前 3 時頃かな いつもの胸の真ん中がギューって締めつけられる感じが来て で前は数分で治ってたんですけど 今回はその 10 分以上続いて 汗もすごい出てきて 息も苦しくなって これはちょっとやばいかもって思って 同僚に運転してもらってここに来て あ そうそう 救急隊じゃないです 同僚の車で 着いた頃には 90% くらい治ってたんですけど 完全には消えてなくて で 心電図撮ってもらったら 今回も特に異常ないって言われたんですけど えーと 前回も前々回も同じこと言われてて で 帰宅して様子見てくださいって でも 毎回毎回これ繰り返してて さすがにおかしいなって 妻にも 病院変えた方がいいんじゃないって言われて でも今回は 怖くなって  あの 私 タバコ吸うんですよね けっこう がっつり 30 本 一日 もう 25 年くらい でやめろやめろって言われてるんですけど 仕事のストレスもあって 全然やめられなくて お酒も毎日のように飲んでて ビールと焼酎と 量はけっこうな量だと思います 妻に怒られるくらいなんで えーと 高血圧は 健診で去年指摘されてて でも病院来てなくて 薬も飲んでなくて で 仕事は深夜勤務で もう 5 年くらい続けてて 寝る時間が朝の 8 時くらいから昼の 2 時くらいまで // === State ===
let currentIdx = 0;
const STORAGE_KEY = "aci_jp_cardio_annotations_v1";

function loadAnnotations() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch { return {}; }
}
function saveAnnotations(annotations) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
}

// === Render sidebar ===
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  const annotations = loadAnnotations();
  sb.innerHTML = "";
  CASES.forEach((c, idx) => {
    const a = annotations[c.encounter_id] || {};
    const item = document.createElement("div");
    item.className = "case-item" + (idx === currentIdx ? " active" : "");
    item.onclick = () => { currentIdx = idx; render(); };

    const formatBadge = c.format === "voice"
      ? '<span class="badge V">V</span>'
      : '<span class="badge S">S</span>';
    const diffBadge = c.is_negative_control
      ? '<span class="badge neg-ctrl">陰性対照</span>'
      : `<span class="badge ${c.difficulty}">${c.difficulty}</span>`;
    const verdictBadge = a.verdict
      ? `<span class="badge status-${a.verdict === "ok" ? "ok" : a.verdict === "warn" ? "warn" : "hold"}">${
          a.verdict === "ok" ? "OK" : a.verdict === "warn" ? "要修正" : "保留"
        }</span>`
      : "";

    item.innerHTML = `
      <div class="id">${formatBadge} ${c.encounter_id}</div>
      <div class="desc">${escapeHtml(c.disease_label_jp)}</div>
      <div class="badges">${diffBadge}${verdictBadge}</div>
    `;
    sb.appendChild(item);
  });
}

function escapeHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

        <dt>診断名</dt><dd><div class="chips">${(kf.diagnoses || []).map(d => `<span class="chip">${escapeHtml(d)}</span>`).join("")}</div></dd>
        <dt>開始薬</dt><dd><div class="chips">${(kf.medications_to_start || []).map(d => `<span class="chip">${escapeHtml(d)}</span>`).join("")}</div></dd>
        <dt>継続薬</dt><dd><div class="chips">${(kf.medications_to_continue || []).map(d => `<span class="chip">${escapeHtml(d)}</span>`).join("")}</div></dd>
        ${kf.medications_to_stop && kf.medications_to_stop.length ? `<dt>中止薬</dt><dd><div class="chips">${kf.medications_to_stop.map(d => `<span class="chip">${escapeHtml(d)}</span>`).join("")}</div></dd>` : ""}
        ${kf.vitals ? `<dt>バイタル</dt><dd>${Object.entries(kf.vitals).map(([k, v]) => `${k}: ${v}`).join(", ")}</dd>` : ""}
        ${kf.labs ? `<dt>検査値</dt><dd>${Object.entries(kf.labs).map(([k, v]) => `${k}: ${v}`).join(", ")}</dd>` : ""}
        ${kf.scores ? `<dt>スコア</dt><dd>${Object.entries(kf.scores).map(([k, v]) => `${k}: ${v}`).join(", ")}</dd>` : ""}
        ${kf.procedures && kf.procedures.length ? `<dt>処置</dt><dd>${kf.procedures.map(escapeHtml).join("、")}</dd>` : ""}
        ${kf.disposition ? `<dt>転帰</dt><dd>${escapeHtml(kf.disposition)}</dd>` : ""}
      </dl>
    </div>
  `;

  // RAG citations
  const ragHtml = c.rag_citations && c.rag_citations.length ? `
    <div class="rag-citations">
      <h3>参照ガイドライン (rag_citations)</h3>
      <ul>
        ${c.rag_citations.map(r => `<li><strong>${escapeHtml(r.guideline)}</strong> — ${escapeHtml(r.section)}: ${escapeHtml(r.key_point)}</li>`).join("")}
      </ul>
    </div>
  ` : "";

  // notes_for_reviewer
  const reviewerNotesHtml = c.notes_for_reviewer ? `
    <div class="notes-reviewer">
      <h3>レビュー時の評価ポイント (notes_for_reviewer)</h3>
      <div>${escapeHtml(c.notes_for_reviewer)}</div>
    </div>
  ` : "";

  // Annotation panel
  const verdictHtml = `
    <div class="annotation-panel">
      <h3>レビュー判定 (${c.encounter_id})</h3>
      <div class="verdict">
        <button data-v="ok"   class="${a.verdict === "ok" ? "selected ok" : ""}">✓ OK <kbd>1</kbd></button>
        <button data-v="warn" class="${a.verdict === "warn" ? "selected warn" : ""}">⚠ 要修正 <kbd>2</kbd></button>
        <button data-v="hold" class="${a.verdict === "hold" ? "selected hold" : ""}">? 保留 <kbd>3</kbd></button>
      </div>
      <textarea id="comment-area" placeholder="コメント・修正指示を記載 (自動保存)">${escapeHtml(a.comment || "")}</textarea>
      <div class="saved-indicator" id="saved-indicator">${a.timestamp ? "最終保存: " + new Date(a.timestamp).toLocaleString("ja-JP") : ""}</div>
      <div class="keyboard-hint">キーボード: <kbd>j</kbd> 次 / <kbd>k</kbd> 前 / <kbd>1</kbd> OK / <kbd>2</kbd> 要修正 / <kbd>3</kbd> 保留</div>
    </div>
  `;

  main.innerHTML = `
    <div class="case-header">
      <div class="id-row">
        <h2>${c.encounter_id}</h2>
        <span class="badge ${c.format === "voice" ? "V" : "S"}">${formatLabel}</span>
        ${c.is_negative_control
          ? '<span class="badge neg-ctrl">陰性対照</span>'
          : `<span class="badge ${c.difficulty}">${c.difficulty}</span>`
        }
      </div>
      <div class="desc">${escapeHtml(c.disease_label_jp)}</div>
    </div>

    ${patientHtml}

    <div class="pair">
      <div class="panel">
        <h3>入力 (SLM への問診)</h3>
        ${inputBody}
      </div>
      <div class="panel">
        <h3>正解 (reference)</h3>
        <div class="section">
          <div class="section-label">SOAP</div>
        </div>
        ${soapBody}
        ${admBody}
      </div>
    </div>

    ${kfHtml}
    ${ragHtml}
    ${reviewerNotesHtml}
    ${verdictHtml}
  `;

  // Wire up annotation buttons
  document.querySelectorAll(".verdict button").forEach(btn => {
    btn.onclick = () => setVerdict(btn.dataset.v);
  });
  const ta = document.getElementById("comment-area");
  if (ta) {
    let saveTimer;
    ta.oninput = () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => updateAnnotation({ comment: ta.value }), 600);
    };
  }
}

function setVerdict(v) {
  updateAnnotation({ verdict: v });
}

function updateAnnotation(patch) {
  const c = CASES[currentIdx];
  const annotations = loadAnnotations();
  const cur = annotations[c.encounter_id] || {};
  annotations[c.encounter_id] = { ...cur, ...patch, timestamp: Date.now() };
  saveAnnotations(annotations);
  render();
}

function nextCase() {
  if (currentIdx < CASES.length - 1) { currentIdx++; render(); }
}
function prevCase() {
  if (currentIdx > 0) { currentIdx--; render(); }
}

// === Keyboard shortcuts ===
document.addEventListener("keydown", e => {
  if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); nextCase(); }
  else if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); prevCase(); }
  else if (e.key === "1") setVerdict("ok");
  else if (e.key === "2") setVerdict("warn");
  else if (e.key === "3") setVerdict("hold");
});

// === Buttons ===
document.getElementById("next-btn").onclick = nextCase;
document.getElementById("prev-btn").onclick = prevCase;
document.getElementById("export-btn").onclick = () => {
  const annotations = loadAnnotations();
  const blob = new Blob([JSON.stringify(annotations, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "aci_jp_cardio_annotations_" + new Date().toISOString().slice(0, 10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
};

// === Init ===
render();
</script>
</body>
</html>
